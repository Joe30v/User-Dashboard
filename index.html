<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faciit User Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="top-nav">
            <header>
                <h1>User Dashboard</h1>
            </header>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-hidden" placeholder="Search users by name...">
            </div>
        </nav>

        <div id="statusMessage" class="status">Loading users...</div>

        <div id="userGrid" class="user-grid"></div>
    </div>

    <div id="userModal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModal" class="close-btn">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <footer class="bottom-bar">
        <button id="togglePreview" class="preview-btn">Show mobile preview</button>
        <div id="mobilePreview" class="mobile-preview hidden">
            <div class="phone-frame">
                <iframe id="previewFrame" src="index.html" title="Mobile preview"></iframe>
            </div>
        </div>
    </footer>
</body>
</html>
